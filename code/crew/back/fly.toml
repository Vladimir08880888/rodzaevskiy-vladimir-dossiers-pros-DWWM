# Configuration Fly.io pour le back-end Crew.
# Documentation : https://fly.io/docs/reference/configuration/

app = "crew-back"
primary_region = "cdg"      # Paris — proche du jury (Marseille)

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  DB_HOST = "127.0.0.1"
  DB_PORT = "3306"
  DB_NAME = "crew_db"
  DB_USER = "crew"
  JWT_EXPIRES_IN = "7d"
  # FRONT_ORIGIN sera renseigné par fly secrets après création de l'app Vercel
  FRONT_ORIGIN = "https://crew-planner.vercel.app"

# Volume persistant pour MariaDB.
[mounts]
  source = "crew_db_data"
  destination = "/var/lib/mysql"

# Service HTTP — Fly fournit le HTTPS automatiquement.
[http_service]
  internal_port = 3000
  force_https = true
  # Pour la démo de soutenance : garder la machine toujours allumée
  # (cold start = double-click apparent côté front pendant le réveil).
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 100

# Machine spec — shared-cpu-1x suffisant pour démo.
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
