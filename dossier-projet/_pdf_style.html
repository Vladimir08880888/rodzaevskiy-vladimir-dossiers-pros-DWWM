<style>
  @page { margin: 1.9cm 1.7cm; }
  html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  body {
    font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: #1f2933;
    font-size: 10.5pt;
    line-height: 1.5;
    max-width: 100%;
  }
  h1.title {
    text-align: center;
    color: #16345c;
    font-size: 25pt;
    font-weight: 800;
    margin: 0.2em 0 0.1em;
    padding-bottom: 0.35em;
    border-bottom: 3px solid #16345c;
  }
  p.subtitle, p.author, p.date { text-align: center; color: #4a5568; margin: 0.2em 0; }
  h1 {
    color: #16345c;
    font-size: 19pt;
    font-weight: 800;
    margin-top: 1.1em;
    padding-bottom: 0.2em;
    border-bottom: 2px solid #16345c;
    page-break-after: avoid;
  }
  h2 {
    color: #1e3a5f;
    font-size: 14.5pt;
    font-weight: 700;
    margin-top: 1.5em;
    padding-bottom: 0.15em;
    border-bottom: 1px solid #d0d7e2;
    page-break-after: avoid;
  }
  h3 { color: #1e3a5f; font-size: 12pt; font-weight: 700; margin-top: 1.1em; page-break-after: avoid; }
  h4 { color: #2c4a6e; font-size: 10.8pt; font-weight: 700; margin-top: 0.9em; page-break-after: avoid; }
  a { color: #2563ac; text-decoration: none; }
  strong { color: #16294a; }
  hr { border: none; border-top: 1px solid #dfe4ec; margin: 1.5em 0; }
  code {
    background: #eef1f5;
    padding: 0.1em 0.34em;
    border-radius: 3px;
    font-family: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    font-size: 8.9pt;
    color: #1e335c;
  }
  pre {
    background: #f5f6f8;
    border: 1px solid #e2e6ec;
    border-radius: 6px;
    padding: 0.7em 0.85em;
    font-size: 8.5pt;
    line-height: 1.42;
    overflow-x: auto;
    page-break-inside: avoid;
  }
  pre code { background: none; padding: 0; color: #283447; font-size: inherit; }
  table { border-collapse: collapse; width: 100%; font-size: 9.4pt; margin: 1em 0; page-break-inside: avoid; }
  th { background: #e8eef5; color: #1e3a5f; text-align: left; padding: 6px 9px; border: 1px solid #cdd6e2; font-weight: 700; }
  td { padding: 6px 9px; border: 1px solid #dfe4ec; vertical-align: top; }
  tr { page-break-inside: avoid; }
  ul, ol { padding-left: 1.4em; }
  li { margin: 0.15em 0; }
  blockquote { border-left: 3px solid #cdd6e2; margin: 1em 0; padding: 0.2em 0 0.2em 1em; color: #4a5568; }
  /* skylighting (pandoc) token colours — keywords navy, strings green, types teal */
  code span.kw { color: #16345c; font-weight: 700; }
  code span.dt { color: #0f7b6c; }
  code span.st { color: #b35309; }
  code span.co { color: #6b7280; font-style: italic; }
  code span.dv, code span.fl { color: #9333ea; }
</style>
